{% extends 'base.html' %}

{% block title %}Gemanti - Home{% endblock %}

{% block styles %}
<link rel="stylesheet" href="/static/css/home.css">
{% endblock %}

{% block content %}

  <!-- Background & top icons -->
  <img class="background-image" src="/static/img/latar_belakang.png" alt="" aria-hidden="true">
  <img class="front-ground" src="/static/img/tanah.png" alt="" aria-hidden="true">
  <img class="leaf leaf-left" src="/static/img/rumput_kiri.png" alt="" aria-hidden="true">
  <img class="leaf leaf-right" src="/static/img/rumput_kanan.png" alt="" aria-hidden="true">

  <button class="icon-button top-action" id="soundButton" type="button" aria-label="Matikan suara">
    <img id="soundIcon" src="/static/img/speaker_aktif.png" alt="">
  </button>
  <button class="icon-button top-action" id="profileButton" type="button" aria-label="Profil">
    <img src="/static/img/home.png" alt="">
  </button>

  <header class="brand">
    <img class="brand-logo" src="/static/img/logo.png" alt="Gemanti - Game Tembang Kurang Interaktif">
  </header>

  <!-- Middle decorations (temple, tower, characters) -->
  <img class="janur janur-left" src="/static/img/jenur_kiri.png" alt="" aria-hidden="true">
  <img class="janur janur-right" src="/static/img/janur_kanan.png" alt="" aria-hidden="true">
  <img class="temple-image" src="/static/img/candi.png" alt="" aria-hidden="true">
  <img class="tower-image" src="/static/img/tugu.png" alt="" aria-hidden="true">
  <img class="people-image" src="/static/img/orang.png" alt="" aria-hidden="true">
  <img class="wayang-image" src="/static/img/wayang.png" alt="" aria-hidden="true">

  <!-- Bottom decorations -->
  <img class="bottom-decor food-image" src="/static/img/makanan.png" alt="" aria-hidden="true">
  <img class="bottom-decor music-image" src="/static/img/alatmusik.png" alt="" aria-hidden="true">

  <div class="menu-wrap">
    <a class="menu-card" id="menuButton" href="/menu" aria-label="Mulai permainan">
      <img class="menu-image" src="/static/img/mulai.png" alt="Mulai">
    </a>
  </div>

{% endblock %}
